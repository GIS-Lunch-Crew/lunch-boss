modules:
  confluence:globalPage:
    - key: lunch-boss-page
      resource: main
      render: native
      resolver:
        function: resolver
      title: Lunch Boss
      route: lunch-boss
  function:
    - key: resolver
      handler: index.handler
    - key: migration
      handler: index.migrationHandler
  sql:
    - key: main
      engine: mysql
  scheduledTrigger:
    - key: run-migrations
      function: migration
      interval: hour
resources:
  - key: main
    path: src/frontend/index.tsx
  - key: wheel
    path: static/wheel/build
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/e7efcf7b-5295-404d-9d0d-e196f590c88b
permissions:
  scopes:
    - read:confluence-user
